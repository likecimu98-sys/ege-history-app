# Temporary same-origin migration preview. Do not include after production cutover.
location /api-preview/ {
    rewrite ^/api-preview/(.*)$ /api/$1 break;
    proxy_pass http://127.0.0.1:8793;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_read_timeout 70s;
    client_max_body_size 9m;
}

location ^~ /migration-preview/ {
    alias /var/www/ege-app-preview/;
    index index.html;
    add_header Cache-Control "no-store" always;
    add_header X-Robots-Tag "noindex, nofollow" always;
}
